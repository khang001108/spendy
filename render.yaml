services:
  # Web Service (đã có sẵn, giữ nguyên)
  - type: web
    name: spendy
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # Cron Job - chạy mỗi phút để gửi push notification
  - type: cron
    name: spendy-push-cron
    runtime: node
    schedule: "* * * * *"   # Mỗi phút
    buildCommand: echo "cron ready"
    startCommand: >
      curl -s -X GET
      "$NEXTAUTH_URL/api/cron?secret=$CRON_SECRET"
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: NEXTAUTH_URL
        sync: false
      - key: CRON_SECRET
        sync: false
